apiVersion: v2
name: enkryptai-stack
description: A Helm chart for Kubernetes
type: application
version: 1.1.21
appVersion: "1.1.21"
dependencies:
  - name: nats
    version: 1.3.14
    alias: nats
    repository: "https://nats-io.github.io/k8s/helm/charts"
    condition: nats.enabled

  - name: nack
    version: 0.29.2
    alias: nack
    repository: "https://nats-io.github.io/k8s/helm/charts/"
    condition: nack.enabled

  - name: openfga
    version: 0.2.26
    alias: openfga
    repository: "https://openfga.github.io/helm-charts"
