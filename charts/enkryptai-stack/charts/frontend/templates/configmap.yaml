apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "frontend.fullname" . }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
data:
  {{- $globalDomain := .Values.global.domain | default "" }}
  NEXT_PUBLIC_URL: {{ .Values.configMap.NEXT_PUBLIC_URL | default (printf "https://app.%s" $globalDomain) | quote }}
