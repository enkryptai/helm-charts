replicaCount: 1

image:
  repository: ""
  pullPolicy: ""
  tag: "vpc"

nameOverride: ""
fullnameOverride: "frontend"

serviceAccount:
  create: false

podAnnotations:
  reloader.stakater.com/auto: "true"
  instrumentation.opentelemetry.io/inject-nodejs: "true"

podLabels:
  app: frontend

env:
  NODE_TLS_REJECT_UNAUTHORIZED: "0"

service:
  type: ClusterIP
  port: 3000
  targetPort: 3000
  name: http

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
  hosts:
    - host: example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: frontend-tls
      hosts:
        - example.com

resources:
  limits:
    cpu: 1700m
    memory: 4Gi
  requests:
    cpu: 200m
    memory: 512Mi

livenessProbe:
  enabled: false
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 120
  timeoutSeconds: 10

readinessProbe:
  enabled: true
  httpGet:
    path: /api/health
    port: 3000
    scheme: HTTP
  failureThreshold: 3
  initialDelaySeconds: 30
  periodSeconds: 10
  successThreshold: 1
  timeoutSeconds: 1

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

configMap:
  NEXT_PUBLIC_URL: "https://app..enkryptai.com"

externalSecret:
  enabled: true
  secretName: frontend-env-secret
  secretStoreRefName: enkryptai-clustersecret-store
  repoName: enkryptai/frontend
  databaseSecretName: onprem
  databaseSecretRepoName: enkryptaivpc/on-prem

secrets:
  name: frontend-env-secret
  enabled: false
  APIAAS_KONG_BASIC_AUTH: basic-auth
  APIAAS_KONG_SERVICE_BASIC_AUTH: basic-auth-token
  APIAAS_KONG_URL: http://gateway-kong
  DEFAULT_ENTERPRISE: true
  ENCRYPTION_PASSPHRASE: passphrase
  FGA_API_URL: http://openfga:8080
  FGA_MODEL_ID: model-id
  FGA_STORE_ID: store-id
  INVITATION_JWT_SECRET: jwt-secret
  LEADERBOARD_BASIC_AUTH: leaderboard
  LEADERBOARD_SUPABASE_SERVICE_ROLE_KEY: leaderboard-supabase-role-key
  MCP_SCANNER_SUPABASE_SERVICE_ROLE_KEY: mcp-role-key
  NEXT_PUBLIC_APIAAS_KONG_URL: https://api.enkryptai.co
  NEXT_PUBLIC_API_URL: http://0.0.0.0:3000
  NEXT_PUBLIC_ENVIRONMENT: production
  NEXT_PUBLIC_LEADERBOARD_SUPABASE_ANON_KEY: leaderboard
  NEXT_PUBLIC_LEADERBOARD_SUPABASE_SERVICE_ROLE_KEY: leaderboard
  NEXT_PUBLIC_LEADERBOARD_SUPABASE_URL: leaderboard
  NEXT_PUBLIC_MCP_SCANNER_SUPABASE_ANON_KEY: mcp-anon-key
  NEXT_PUBLIC_MCP_SCANNER_SUPABASE_URL: https://nhecqixvcegdosnmprqn.supabase.com
  NEXT_PUBLIC_OKTA_DOMAIN: enkryptai.com
  NEXT_PUBLIC_OKTA_ENABLED: true
  NEXT_PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
  NEXT_PUBLIC_POSTHOG_KEY: posthog-key
  NEXT_PUBLIC_SUPABASE_ANON_KEY: supabase-anon-key
  NEXT_PUBLIC_SUPABASE_URL: https://auth.enkryptai.con
  NEXT_PUBLIC_URL: https://app.enkryptai.co
  RESEND_API_KEY: api-key-resend
  SAMPLE_MODEL_API_KEY: model-key
  SAMPLE_MODEL_PASSWORD: model-password
  SAMPLE_REPORTS_USER_ID: sample-user
  STRIPE_PUBLIC_KEY: pk_test
  STRIPE_SECRET_KEY: sk_test
  STRIPE_WEBHOOK_SECRET: webhook-secret
  SUPABASE_SERVICE_ROLE_KEY: service-role-key
