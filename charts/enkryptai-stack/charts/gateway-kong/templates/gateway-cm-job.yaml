apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway-configmap-sa
  namespace: enkryptai-stack
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-30"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gateway-configmap-role
  namespace: enkryptai-stack
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gateway-configmap-binding
  namespace: enkryptai-stack
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
subjects:
- kind: ServiceAccount
  name: gateway-configmap-sa
  namespace: enkryptai-stack
roleRef:
  kind: Role
  name: gateway-configmap-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: create-gateway-configmap
  namespace: enkryptai-stack
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-9"
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: gateway-configmap-sa
      restartPolicy: Never
      containers:
        - name: create-gateway-configmap
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              kubectl apply -f https://raw.githubusercontent.com/enkryptai/helm-charts/main/charts/enkryptai-stack/gateway-temp-config-map.yaml