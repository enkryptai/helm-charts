{{- if .Values.ingress.enabled -}}
{{- $globalDomain := .Values.global.domain | default "" -}}
{{- $autoHost := "" -}}
{{- if $globalDomain }}
{{- $autoHost = printf "auth.%s" $globalDomain -}}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "supabase.fullname" . }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if or .Values.ingress.tls (and $autoHost .Values.ingress.tls) }}
  tls:
    {{- if .Values.ingress.tls }}
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
    {{- else if $autoHost }}
    - hosts:
        - {{ $autoHost | quote }}
      secretName: supabase-tls
    {{- end }}
  {{- end }}
  rules:
    {{- if .Values.ingress.hosts }}
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $.Release.Name }}-supabase-kong
                port:
                  number: 8000
          {{- end }}
    {{- end }}
    {{- else if $autoHost }}
    - host: {{ $autoHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-supabase-kong
                port:
                  number: 8000
    {{- end }}
{{- end }}
