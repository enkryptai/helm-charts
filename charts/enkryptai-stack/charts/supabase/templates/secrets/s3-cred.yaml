{{- if .Values.secret.s3 }}
{{- if .Values.secret.s3.cred }}
apiVersion: v1
kind: Secret
metadata:
  name: s3-cred
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $val := .Values.secret.s3.cred }}
  {{- if ne $key "enabled" }}
  {{ $key }}: {{ $val | default "" | toString | quote }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end }}
