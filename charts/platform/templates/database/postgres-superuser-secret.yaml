{{- if .Values.secrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: postgres-superuser-secret
type: Opaque
stringData:
  {{- range $key, $val := .Values.secrets.postgres }}
  {{- if ne $key "enabled" }}
  {{ $key }}: {{ $val | default "" | toString | quote }}
  {{- end }}
  {{- end }}
{{- end }}
