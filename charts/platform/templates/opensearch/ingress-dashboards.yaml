{{- if .Values.opensearch.dashboards.ingress.enabled -}}
{{- $globalDomain := .Values.global.domain | default "" -}}
{{- $host := .Values.opensearch.dashboards.ingress.host | default "" -}}
{{- if and (not $host) $globalDomain }}
{{- $host = printf "opensearch.%s" $globalDomain -}}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.clustername }}-dashboards
  {{- with .Values.opensearch.dashboards.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.opensearch.dashboards.ingress.className }}
  ingressClassName: {{ .Values.opensearch.dashboards.ingress.className }}
  {{- end }}
  {{- if .Values.opensearch.dashboards.ingress.tls }}
  tls:
    {{- range .Values.opensearch.dashboards.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- else if $host }}
  tls:
    - hosts:
        - {{ $host | quote }}
      secretName: opensearch-dashboards-tls
  {{- end }}
  rules:
    - host: {{ $host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.clustername }}-dashboards
                port:
                  number: 5601
{{- end }}
