# elastic-env-secret - Used by: Elasticsearch / Fluent Bit logging pipeline
# Create this secret before installing the EnkryptAI Helm charts.
# Contains Elasticsearch connection details and Stakater reloader annotations.
apiVersion: v1
kind: Secret
metadata:
  name: elastic-env-secret
  namespace: enkryptai-stack
type: Opaque
stringData:
  # --- Elasticsearch Connection ---
  ELASTIC_HOST: "<elasticsearch-host, e.g. https://elasticsearch:9200>"
  ELASTIC_PORT: "<elasticsearch-port, e.g. 9200>"
  ELASTIC_USERNAME: "<elasticsearch-username, e.g. elastic>"
  ELASTIC_PASSWORD: "<elasticsearch-password>"

  # --- Stakater Reloader References ---
  STAKATER_FLUENT_BIT_CONFIG_CONFIGMAP: "<fluent-bit-configmap-name-for-stakater-reloader>"
  STAKATER_GATEWAY_MIGRATION_ENV_SECRET_SECRET: "<gateway-migration-secret-name-for-stakater-reloader>"
