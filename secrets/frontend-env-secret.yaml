# frontend-env-secret - Used by: Frontend (Next.js dashboard application)
# Create this secret before installing the EnkryptAI Helm charts.
# Contains configuration for the frontend application including API endpoints,
# Supabase credentials, authentication keys, and third-party service integrations.
apiVersion: v1
kind: Secret
metadata:
  name: frontend-env-secret
  namespace: enkryptai-stack
type: Opaque
stringData:
  # --- Kong API Gateway ---
  APIAAS_KONG_BASIC_AUTH: "<basic-auth-credentials-for-kong-api-gateway>"
  APIAAS_KONG_SERVICE_BASIC_AUTH: "<basic-auth-credentials-for-kong-service-routes>"
  APIAAS_KONG_URL: "<internal-kong-gateway-url, e.g. http://gateway:8000>"
  NEXT_PUBLIC_APIAAS_KONG_URL: "<public-facing-kong-gateway-url, e.g. https://api.example.com>"

  # --- Encryption ---
  ENCRYPTION_PASSPHRASE: "<passphrase-used-to-encrypt-sensitive-data-at-rest>"

  # --- Application URLs ---
  NEXT_PUBLIC_API_URL: "<public-api-url-for-frontend-requests>"
  NEXT_PUBLIC_ENVIRONMENT: "<environment-name, e.g. production, staging, development>"
  NEXT_PUBLIC_URL: "<public-url-of-the-frontend-app, e.g. https://app.example.com>"

  # --- Supabase (Primary) ---
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "<supabase-anonymous-public-key>"
  NEXT_PUBLIC_SUPABASE_URL: "<supabase-project-url, e.g. https://your-project.supabase.co>"
  SUPABASE_SERVICE_ROLE_KEY: "<supabase-service-role-key-for-server-side-operations>"

  # --- Supabase (Leaderboard) ---
  NEXT_PUBLIC_LEADERBOARD_SUPABASE_URL: "<leaderboard-supabase-project-url>"
  NEXT_PUBLIC_LEADERBOARD_SUPABASE_ANON_KEY: "<leaderboard-supabase-anonymous-key>"
  NEXT_PUBLIC_LEADERBOARD_SUPABASE_SERVICE_ROLE_KEY: "<leaderboard-supabase-service-role-key>"
  LEADERBOARD_BASIC_AUTH: "<basic-auth-credentials-for-leaderboard-api>"

  # --- Email Service ---
  RESEND_API_KEY: "<resend-api-key-for-sending-transactional-emails>"

  # --- OpenFGA (Authorization) ---
  FGA_API_URL: "<openfga-api-url, e.g. http://openfga:8080>"
  FGA_STORE_ID: "<openfga-store-id>"
  FGA_MODEL_ID: "<openfga-authorization-model-id>"

  # --- Authentication ---
  INVITATION_JWT_SECRET: "<jwt-secret-for-signing-invitation-tokens>"

  # --- Analytics (PostHog) ---
  NEXT_PUBLIC_POSTHOG_HOST: "<posthog-host-url, e.g. https://app.posthog.com>"
  NEXT_PUBLIC_POSTHOG_KEY: "<posthog-project-api-key>"

  # --- Sample Model Configuration ---
  SAMPLE_MODEL_API_KEY: "<api-key-for-sample-model-demo>"
  SAMPLE_MODEL_PASSWORD: "<password-for-sample-model-access>"
  SAMPLE_REPORTS_USER_ID: "<user-id-for-generating-sample-reports>"
