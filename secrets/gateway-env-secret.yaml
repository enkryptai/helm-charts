# gateway-env-secret - Used by: Kong API Gateway
# Create this secret before installing the EnkryptAI Helm charts.
# Contains Kong configuration, upstream service endpoints, database credentials,
# and deck configuration for gateway routing and plugins.
apiVersion: v1
kind: Secret
metadata:
  name: gateway-env-secret
  namespace: enkryptai-stack
type: Opaque
stringData:
  # --- Kong Tracing ---
  KONG_TRACING_INSTRUMENTATIONS: "<tracing-instrumentations, e.g. all>"
  KONG_TRACING_SAMPLING_RATE: "<sampling-rate, e.g. 1.0>"

  # --- OpenFGA Integration ---
  DECK_OPENFGA_URL: "<openfga-url, e.g. http://openfga:8080>"
  DECK_OPENFGA_STORE_ID: "<openfga-store-id>"
  DECK_OPENFGA_AUTHORIZATION_MODEL_ID: "<openfga-authorization-model-id>"

  # --- Dashboard Configuration ---
  DECK_APP_DASHBOARD_DOMAIN: "<dashboard-domain, e.g. app.example.com>"
  DECK_APP_DASHBOARD_DOMAIN_URL: "<full-dashboard-url, e.g. https://app.example.com>"
  DECK_APP_DASHBOARD_PORT: "<dashboard-port, e.g. 3000>"
  DECK_APP_DASHBOARD_SCHEME: "<dashboard-scheme, e.g. http>"

  # --- Logging & Monitoring ---
  DECK_ELASTIC_HOST: "<elasticsearch-host, e.g. http://elasticsearch:9200>"
  DECK_ENKRYPT_ENVIRONMENT: "<environment-name, e.g. production>"
  DECK_FLUENT_BIT_HOST: "<fluent-bit-host, e.g. fluent-bit>"
  DECK_KONG_LOGS_PLUGIN_ELASTIC_BASIC_AUTH: "<base64-encoded-elastic-basic-auth>"

  # --- Guardrails Service ---
  DECK_GUARDRAILS_HOST: "<guardrails-service-host, e.g. guardrails>"
  DECK_GUARDRAILS_PORT: "<guardrails-service-port, e.g. 8787>"
  DECK_GUARDRAILS_SCHEME: "<guardrails-scheme, e.g. http>"

  # --- Kong Admin Credentials ---
  DECK_INTERNAL_KONG_ADMIN_EMAIL: "<kong-admin-email>"
  DECK_INTERNAL_KONG_ADMIN_USERNAME: "<kong-admin-username>"
  DECK_INTERNAL_KONG_ADMIN_PASSWORD: "<kong-admin-password>"

  # --- KeyDB / Redis ---
  DECK_KEYDB_HOST: "<keydb-host, e.g. keydb:6379>"
  DECK_KONG_ADDR: "<kong-admin-address, e.g. http://localhost:8001>"

  # --- Leaderboard Service ---
  DECK_LEADERBOARD_AUTH: "<leaderboard-basic-auth-credentials>"
  DECK_LEADERBOARD_CORS_ORIGIN: "<allowed-cors-origin-for-leaderboard>"
  DECK_LEADERBOARD_DETAILS_PASSWORD: "<leaderboard-details-endpoint-password>"
  DECK_LEADERBOARD_HOST: "<leaderboard-service-host>"
  DECK_LEADERBOARD_PORT: "<leaderboard-service-port, e.g. 8000>"
  DECK_LEADERBOARD_PUBLIC_CONSUMER_API_KEY: "<public-consumer-api-key-for-leaderboard>"
  DECK_LEADERBOARD_PUBLIC_CONSUMER_EMAIL: "<public-consumer-email-for-leaderboard>"
  DECK_LEADERBOARD_SCHEME: "<leaderboard-scheme, e.g. http>"

  # --- Frontend Auth ---
  DECK_NEXT_JS_BASIC_AUTH: "<basic-auth-for-nextjs-backend-routes>"
  DECK_VERCEL_PROTECTION_AUTH: "<vercel-protection-bypass-auth-token>"

  # --- Red Teaming Service ---
  DECK_RED_TEAMING_HOST: "<red-teaming-service-host>"
  DECK_RED_TEAMING_PORT: "<red-teaming-service-port, e.g. 8000>"
  DECK_RED_TEAMING_SCHEME: "<red-teaming-scheme, e.g. http>"
  DECK_RED_TEAMING_URL: "<full-red-teaming-url>"

  # --- Kong Core Configuration ---
  KONG_LOG_LEVEL: "<log-level, e.g. notice>"
  KONG_PROXY_LISTEN: "<proxy-listen-address, e.g. 0.0.0.0:8000, 0.0.0.0:8443 ssl>"
  KONG_ADMIN_LISTEN: "<admin-listen-address, e.g. 0.0.0.0:8001>"

  # --- Kong PostgreSQL Database ---
  KONG_DATABASE: "<database-type, e.g. postgres>"
  KONG_PG_DATABASE: "<kong-database-name>"
  KONG_PG_HOST: "<postgres-host>"
  KONG_PG_PASSWORD: "<postgres-password>"
  KONG_PG_PORT: "<postgres-port, e.g. 5432>"
  KONG_PG_USER: "<postgres-username>"
  KONG_PG_SSL: "<enable-ssl, e.g. on or off>"
  KONG_PG_SSL_VERSION: "<ssl-version, e.g. tlsv1_2>"
  KONG_PG_SSL_REQUIRED: "<require-ssl, e.g. on or off>"
  KONG_PG_SSL_VERIFY: "<verify-ssl-cert, e.g. on or off>"

  # --- Kong Performance Tuning ---
  KONG_NGINX_HTTP_CLIENT_BODY_BUFFER_SIZE: "<client-body-buffer-size, e.g. 10m>"
  KONG_MEM_CACHE_SIZE: "<memory-cache-size, e.g. 200m>"
  KONG_UPSTREAM_KEEPALIVE_MAX_REQUESTS: "<max-keepalive-requests, e.g. 10000>"
  KONG_NGINX_HTTP_KEEPALIVE_REQUESTS: "<keepalive-requests, e.g. 10000>"
  KONG_PROXY_ACCESS_LOG: "<access-log-path, e.g. /dev/stdout or off>"
  KONG_SSL_PROTOCOLS: "<ssl-protocols, e.g. TLSv1.2 TLSv1.3>"

  # --- Sample Model ---
  DECK_INITIAL_SAMPLE_MODEL_PASSWORD: "<initial-password-for-sample-model-consumer>"
  DECK_SAMPLE_MODEL_REAL_APIKEY: "<real-api-key-for-sample-model-provider>"
