# gateway-migration-env-secret - Used by: Kong Gateway Database Migration Job
# Create this secret before installing the EnkryptAI Helm charts.
# Contains the subset of Kong configuration needed to run database migrations.
apiVersion: v1
kind: Secret
metadata:
  name: gateway-migration-env-secret
  namespace: enkryptai-stack
type: Opaque
stringData:
  # --- Kong Core ---
  KONG_LOG_LEVEL: "<log-level, e.g. notice>"
  KONG_PROXY_LISTEN: "<proxy-listen-address, e.g. 0.0.0.0:8000, 0.0.0.0:8443 ssl>"

  # --- Kong PostgreSQL Database ---
  KONG_DATABASE: "<database-type, e.g. postgres>"
  KONG_PG_DATABASE: "<kong-database-name>"
  KONG_PG_HOST: "<postgres-host>"
  KONG_PG_PASSWORD: "<postgres-password>"
  KONG_PG_PORT: "<postgres-port, e.g. 5432>"
  KONG_PG_USER: "<postgres-username>"
  KONG_PG_SSL: "<enable-ssl, e.g. on or off>"
  KONG_PG_SSL_VERSION: "<ssl-version, e.g. tlsv1_2>"
  KONG_PG_SSL_REQUIRED: "<require-ssl, e.g. on or off>"
  KONG_PG_SSL_VERIFY: "<verify-ssl-cert, e.g. on or off>"

  # --- Kong Performance Tuning ---
  KONG_NGINX_HTTP_CLIENT_BODY_BUFFER_SIZE: "<client-body-buffer-size, e.g. 10m>"
  KONG_MEM_CACHE_SIZE: "<memory-cache-size, e.g. 200m>"
  KONG_UPSTREAM_KEEPALIVE_MAX_REQUESTS: "<max-keepalive-requests, e.g. 10000>"
  KONG_NGINX_HTTP_KEEPALIVE_REQUESTS: "<keepalive-requests, e.g. 10000>"
  KONG_PROXY_ACCESS_LOG: "<access-log-path, e.g. /dev/stdout or off>"
  KONG_SSL_PROTOCOLS: "<ssl-protocols, e.g. TLSv1.2 TLSv1.3>"
