# guardrails-env-secret - Used by: Guardrails Service
# Create this secret before installing the EnkryptAI Helm charts.
# Contains API keys and configuration for the guardrails content safety engine.
apiVersion: v1
kind: Secret
metadata:
  name: guardrails-env-secret
  namespace: enkryptai-stack
type: Opaque
stringData:
  # --- Hugging Face ---
  HF_TOKEN: "<your-hugging-face-api-token-for-model-downloads>"

  # --- OpenAI ---
  OPENAI_API_KEY: "<your-openai-api-key-for-guardrails-detectors>"

  # --- Guardrails Configuration ---
  DEBIAS_MODE: "<debias-mode, e.g. true or false>"
  POLICY: "<guardrails-policy-config>"

  # --- Beam (Optional ML inference) ---
  BEAM_URL: "<beam-inference-url>"
  BEAM_API_KEY: "<beam-api-key>"

  # --- Google Gemini (Optional) ---
  GEMINI_API_KEY: "<your-google-gemini-api-key>"
