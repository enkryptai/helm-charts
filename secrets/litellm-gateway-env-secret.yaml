# litellm-gateway-env-secret - Used by: LiteLLM Gateway (LLM proxy/router)
# Create this secret before installing the EnkryptAI Helm charts.
# Contains the master key, database URL, and API keys for the LiteLLM proxy.
apiVersion: v1
kind: Secret
metadata:
  name: litellm-gateway-env-secret
  namespace: enkryptai-stack
type: Opaque
stringData:
  # --- LiteLLM Configuration ---
  LITELLM_MASTER_KEY: "<litellm-master-key-for-admin-api-access>"
  DATABASE_URL: "<postgres-connection-url, e.g. postgresql://user:pass@host:5432/litellm>"

  # --- LLM Provider Keys ---
  OPENAI_API_KEY: "<your-openai-api-key-for-litellm-routing>"
