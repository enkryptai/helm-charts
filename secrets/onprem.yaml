# onprem - Used by: Supabase (Auth, Database, API)
# Create this secret before installing the EnkryptAI Helm charts.
# Contains core Supabase configuration including the Postgres password,
# JWT secret, API keys, and dashboard credentials.
apiVersion: v1
kind: Secret
metadata:
  name: onprem
  namespace: enkryptai-stack
type: Opaque
stringData:
  # --- Supabase Postgres ---
  POSTGRES_PASSWORD: "<strong-password-for-supabase-postgres-database>"

  # --- Supabase JWT ---
  JWT_SECRET: "<jwt-secret-for-supabase-auth, minimum-32-characters>"

  # --- Supabase API Keys ---
  ANON_KEY: "<supabase-anon-key-jwt-for-public-access>"
  SERVICE_ROLE_KEY: "<supabase-service-role-key-jwt-for-server-side-access>"

  # --- Supabase Studio Dashboard ---
  DASHBOARD_USERNAME: "<supabase-studio-dashboard-username>"
  DASHBOARD_PASSWORD: "<supabase-studio-dashboard-password>"
