# openfga-env-secret - Used by: OpenFGA (Fine-Grained Authorization)
# Create this secret before installing the EnkryptAI Helm charts.
# Contains the database connection details for the OpenFGA authorization store.
apiVersion: v1
kind: Secret
metadata:
  name: openfga-env-secret
  namespace: enkryptai-stack
type: Opaque
stringData:
  # --- OpenFGA Database Connection ---
  uri: "<postgres-connection-uri, e.g. postgres://user:pass@host:5432/openfga?sslmode=disable>"
  username: "<database-username>"
  password: "<database-password>"
