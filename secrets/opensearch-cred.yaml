# opensearch-cred - Used by: OpenSearch (log analytics and search)
# Create this secret before installing the EnkryptAI Helm charts.
# Contains credentials for OpenSearch authentication and S3-compatible storage access.
apiVersion: v1
kind: Secret
metadata:
  name: opensearch-cred
  namespace: enkryptai-stack
type: Opaque
stringData:
  # --- OpenSearch Admin Credentials ---
  username: "<opensearch-admin-username, e.g. admin>"
  password: "<opensearch-admin-password>"

  # --- S3-Compatible Storage Credentials (for OpenSearch snapshots/indices) ---
  access_key: "<s3-access-key-for-opensearch-storage>"
  secret_key: "<s3-secret-key-for-opensearch-storage>"
