# opensearch-securityconfig - Used by: OpenSearch Security Plugin
# Create this secret before installing the EnkryptAI Helm charts.
# Contains the OpenSearch security plugin configuration including admin
# password hash and internal user definitions.
#
# To generate a bcrypt hash for the admin password, use:
#   docker run -it opensearchproject/opensearch:2 \
#     /usr/share/opensearch/plugins/opensearch-security/tools/hash.sh -p <your-password>
apiVersion: v1
kind: Secret
metadata:
  name: opensearch-securityconfig
  namespace: enkryptai-stack
type: Opaque
stringData:
  # --- Internal Users Configuration ---
  # This is the internal_users.yml content for the OpenSearch security plugin.
  # Replace the hash with a bcrypt hash of your admin password.
  internal_users.yml: |
    ---
    _meta:
      type: "internalusers"
      config_version: 2
    admin:
      hash: "<bcrypt-hash-of-admin-password>"
      reserved: true
      backend_roles:
        - "admin"
      description: "OpenSearch admin user"
