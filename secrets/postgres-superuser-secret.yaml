# postgres-superuser-secret - Used by: PostgreSQL (primary database superuser)
# Create this secret before installing the EnkryptAI Helm charts.
# Contains the superuser credentials for the PostgreSQL database cluster.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-superuser-secret
  namespace: enkryptai-stack
type: Opaque
stringData:
  # --- PostgreSQL Superuser Credentials ---
  username: "<postgres-superuser-username, e.g. postgres>"
  password: "<strong-postgres-superuser-password>"
