# redteam-proxy-env-secret - Used by: Red Team Proxy Service (red teaming job runner)
# Create this secret before installing the EnkryptAI Helm charts.
# NOTE: This secret is deployed in the "redteam-jobs" namespace, not "enkryptai-stack".
# Contains API keys, storage credentials, and service configuration for red teaming operations.
apiVersion: v1
kind: Secret
metadata:
  name: redteam-proxy-env-secret
  namespace: redteam-jobs
type: Opaque
stringData:
  # --- LLM Provider API Keys ---
  OPENAI_API_KEY: "<your-openai-api-key>"
  GROQ_API_KEY: "<your-groq-api-key>"
  GOOGLE_API_KEY: "<your-google-api-key>"
  MISTRAL_API_KEY: "<your-mistral-api-key>"

  # --- Hugging Face ---
  HF_TOKEN: "<your-hugging-face-api-token>"

  # --- AWS / S3-Compatible Storage ---
  REGION: "<aws-region, e.g. us-east-1>"
  ACCESS_KEY_ID: "<s3-access-key-id>"
  SECRET_ACCESS_KEY: "<s3-secret-access-key>"
  ENDPOINT: "<s3-endpoint-url>"

  # --- Redis ---
  REDIS_URL: "<redis-connection-url, e.g. redis://keydb:6379>"

  # --- Supabase ---
  SUPABASE_URL: "<supabase-project-url>"
  SUPABASE_KEY: "<supabase-service-role-key>"
  SUPABASE_STORAGE_URL: "<supabase-storage-url>"

  # --- Notifications ---
  SLACK_ALERT_ROOM_WEBHOOK_URL: "<slack-webhook-url-for-red-team-alerts>"

  # --- Proxy Configuration ---
  PROXY_USERNAME: "<proxy-server-username>"
  PROXY_PASSWORD: "<proxy-server-password>"
  PROXY_SERVER: "<proxy-server-address, e.g. http://proxy:8080>"

  # --- Frontend Auth ---
  NEXTJS_AUTH_TOKEN: "<nextjs-auth-token-for-callback-requests>"

  # --- Sierra Integration ---
  SIERRA_TOKEN: "<sierra-api-token>"
  SIERRA_RELEASE: "<sierra-release-version>"
