# s3-cred - Used by: Services requiring S3-compatible object storage (backups, artifacts)
# Create this secret before installing the EnkryptAI Helm charts.
# Contains credentials and configuration for S3-compatible object storage.
# This can be AWS S3 or any S3-compatible service (MinIO, Ceph, etc.).
apiVersion: v1
kind: Secret
metadata:
  name: s3-cred
  namespace: enkryptai-stack
type: Opaque
stringData:
  # --- S3 Credentials ---
  ACCESS_KEY_ID: "<s3-access-key-id>"
  SECRET_ACCESS_KEY: "<s3-secret-access-key>"

  # --- S3 Configuration ---
  ENDPOINT: "<s3-endpoint-url, e.g. https://s3.amazonaws.com or http://minio:9000>"
  REGION: "<s3-region, e.g. us-east-1>"
  BUCKET_NAME: "<s3-bucket-name-for-enkryptai-storage>"
