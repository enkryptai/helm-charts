# superuser-secret - Used by: Application services requiring direct database access
# Create this secret before installing the EnkryptAI Helm charts.
# Contains the full database connection parameters for application-level superuser access.
apiVersion: v1
kind: Secret
metadata:
  name: superuser-secret
  namespace: enkryptai-stack
type: Opaque
stringData:
  # --- Database Connection Parameters ---
  DB_HOST: "<postgres-host, e.g. postgres.enkryptai-stack.svc.cluster.local>"
  DB_PORT: "<postgres-port, e.g. 5432>"
  DB_USER: "<database-username>"
  DB_PASSWORD: "<database-password>"
  DB_NAME: "<database-name>"
